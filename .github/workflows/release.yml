# 当推送 tag（如 v1.3.0 或 1.3.0）时，自动构建并发布 GitHub Release
#
# 流程：build job（按 matrix 并行构建多个 RID）→ release job（汇总所有 zip，读取 RELEASE_NOTES.md 创建 Release）
# 关联文件：
#   - Assets/RELEASE_NOTES.md   ← Release 说明正文（每次发布前编辑）
#   - Docs/publish-fdd.ps1      ← 本地一键打包脚本（本 workflow 不调用，仅供手动使用）
#   - Docs/release.ps1           ← 本地一键发布脚本（含 tag + gh release，可替代本 workflow）

name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（如 1.8.1）'
        required: true

permissions:
  contents: write

jobs:
  # ── 第一阶段 A：TrueFluentPro + Updater（按 RID 并行） ──
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish TrueFluentPro.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained false `
            -o artifacts/publish/TrueFluentPro-${{ matrix.rid }}-fdd

      - name: Publish Updater (${{ matrix.rid }})
        run: |
          dotnet publish tools/Updater/Updater.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained false `
            -o artifacts/updater-${{ matrix.rid }}
          Copy-Item "artifacts/updater-${{ matrix.rid }}/Updater.exe" `
            "artifacts/publish/TrueFluentPro-${{ matrix.rid }}-fdd/Updater.exe"

      - name: Create zip
        run: |
          Compress-Archive `
            -Path "artifacts/publish/TrueFluentPro-${{ matrix.rid }}-fdd/*" `
            -DestinationPath "artifacts/TrueFluentPro-${{ matrix.rid }}-fdd.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/TrueFluentPro-${{ matrix.rid }}-fdd.zip

  # ── 第一阶段 B：IconTool（自包含trimmed单文件） + IconToolUI（FDD），仅 win-x64 ──
  build-tools:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish IconTool
        run: |
          dotnet publish tools/IconTool/IconTool.csproj -c Release -o artifacts/publish/IconTool

      - name: Publish IconToolUI
        run: |
          dotnet publish tools/IconToolUI/IconToolUI.csproj -c Release -r win-x64 --self-contained false -o artifacts/publish/IconToolUI

      - name: Create zips
        run: |
          Compress-Archive -Path "artifacts/publish/IconTool/*" -DestinationPath "artifacts/IconTool-win-x64.zip"
          Compress-Archive -Path "artifacts/publish/IconToolUI/*" -DestinationPath "artifacts/IconToolUI-win-x64.zip"

      - name: Upload IconTool
        uses: actions/upload-artifact@v4
        with:
          name: release-icontool
          path: artifacts/IconTool-win-x64.zip

      - name: Upload IconToolUI
        uses: actions/upload-artifact@v4
        with:
          name: release-icontoolui
          path: artifacts/IconToolUI-win-x64.zip

  # ── 第二阶段：汇总所有 zip，读取 RELEASE_NOTES.md，创建 GitHub Release ──
  release:
    needs: [build, build-tools]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          sparse-checkout: |
            Assets/RELEASE_NOTES.md
            RELEASE_NOTES.md

      - name: Resolve release notes path
        id: resolve_notes
        shell: bash
        run: |
          if [ -f "Assets/RELEASE_NOTES.md" ]; then
            echo "path=Assets/RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          elif [ -f "RELEASE_NOTES.md" ]; then
            echo "path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_NOTES.md not found in Assets/ or repository root"
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: ${{ steps.resolve_notes.outputs.path }}
          generate_release_notes: true
          append_body: true
          files: dist/*.zip
